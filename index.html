<!DOCTYPE html>
<html>
<head>
  <base href="/web/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="EmuTrain - 铁路爱好者工具箱">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="EmuTrain">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>EmuTrain</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    #loading img { width: 80px; height: 80px; margin-bottom: 20px; border-radius: 16px; }
    #loading h2 { margin: 0 0 8px; font-size: 20px; color: #fff; }
    #loading p { margin: 0; font-size: 14px; opacity: 0.7; }
    #loading .spinner {
      width: 32px; height: 32px; margin-top: 20px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/Icon-192.png" alt="EmuTrain">
    <h2>EmuTrain</h2>
    <p>首次启动加载中，请耐心等待…</p>
    <div class="spinner"></div>
  </div>
  <script src="flutter.js" defer></script>
  <script>
    function hideLoading() {
      var el = document.getElementById('loading');
      if (el && !el.classList.contains('fade-out')) {
        el.classList.add('fade-out');
        setTimeout(function() { el.remove(); }, 900);
      }
    }
    window.addEventListener('flutter-first-frame', hideLoading);
    setTimeout(hideLoading, 90000);
    window.addEventListener('load', function() {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
